<section class="mt-20 md:mt-30 overflow-hidden py-6">
  <div class="container mx-auto px-6">
    <div class="flex items-center justify-center mb-10">
      <h2 class="font-semibold text-sm md:text-md text-gray-400 uppercase tracking-widest">
        Trusted by the world’s best
      </h2>
    </div>

    <div class="relative flex overflow-x-hidden mt-14">
      <div class="animate-marquee whitespace-nowrap flex items-center gap-16 md:gap-24">

        @for (item of destinations; track item.id) {
          <div class="flex-shrink-0">
            <img [src]="'/images/' + item.image" [alt]="item.alt"
              class="h-8 md:h-10 w-auto object-contain opacity-50 hover:opacity-100 transition-opacity duration-300 filter grayscale hover:grayscale-0" />
          </div>
        }

        @for (item of destinations; track item.id + '-clone') {
          <div class="flex-shrink-0">
            <img [src]="'/images/' + item.image" [alt]="item.alt"
              class="h-8 md:h-10 w-auto object-contain opacity-50 hover:opacity-100 transition-opacity duration-300 filter grayscale hover:grayscale-0" />
          </div>
        }
      </div>
    </div>
  </div>
</section>
