<section class="container mt-20 md:mt-30">
  <div class="flex items-center justify-between mb-10">
  <h1 class="font-bold text-3xl  text-[var(--text-dark)]">Trending destinations</h1>
  <a href="#">See All</a>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-6">
    @for (item of destinations; track item.name) {
    <div class="trending-box group w-full h-[180px] overflow-hidden relative rounded-2xl cursor-pointer">
      <img [src]="'/images/' + item.image" [alt]="item.name"
        class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />

      <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent"></div>

      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center w-full">
        <p class="text-white text-2xl font-bold tracking-wide">{{ item.name }}</p>
        <p class="text-gray-200 text-sm font-medium">{{ item.tours }} Tours</p>
      </div>
    </div>
    }
  </div>
</section>
