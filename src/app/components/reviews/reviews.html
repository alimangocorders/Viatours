<section class="container mt-20 md:mt-40 px-4">
  <h1 class="font-bold text-3xl mb-10 text-[var(--text-dark)] text-center">Customer Reviews</h1>

  <div class="flex flex-col gap-6 mt-6 items-center justify-center">
    <img src="/images/quote.png" alt="quote" class="w-15 h-10" />

    <div class="w-full md:w-[60%] lg:w-[50%] text-center">
      <p class="py-6 text-lg text-gray-600 leading-relaxed italic">
        "{{ customerReviews[activeIndex].text }}"
      </p>

      <div class="mb-8">
        <p class="font-bold text-xl text-[var(--text-dark)]">{{ customerReviews[activeIndex].name }}</p>
        <p class="text-gray-500">{{ customerReviews[activeIndex].role }}</p>
      </div>

      <div class="flex justify-center items-center gap-4 md:gap-6 py-4">
        @for (client of customerReviews; track $index) {
          <div
            (click)="setReview($index)"
            class="client-img-box cursor-pointer transition-all duration-300 rounded-full p-1 border-2"
            [class.border-[var(--primary-color)]]="activeIndex === $index"
            [class.border-transparent]="activeIndex !== $index"
            [class.scale-110]="activeIndex === $index"
          >
            <img
              [src]="'/images/' + client.image"
              [alt]="client.name"
              class="w-14 h-14 md:w-16 md:h-16 rounded-full object-cover grayscale hover:grayscale-0 transition-all"
              [class.grayscale-0]="activeIndex === $index"
            >
          </div>
        }
      </div>
    </div>
  </div>
</section>
